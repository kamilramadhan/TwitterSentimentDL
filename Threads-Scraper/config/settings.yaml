# General scraper settings
base_url: "https://www.threads.net"
timeout: 15
use_offline: false        # run live scraping by default
use_proxies: false        # set true to use proxies from proxies.json
allow_offline_fallback: false  # keep live output clean; do not inject synthetic rows
limit: 50
min_total_items: 5000     # target minimum total records collected
related_limit: 25         # related usernames discovered per visited profile
max_users: 900            # hard cap on visited profiles to avoid infinite crawling
# Default usernames used if none provided via CLI
usernames:
  - zuck
  - mosseri
# Optional cookie (can also be set via .env as THREADS_COOKIE)
cookie: ""
